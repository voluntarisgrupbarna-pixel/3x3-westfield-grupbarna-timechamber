name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Inject env vars
        run: |
          {
            echo "VITE_JOTFORM_API_KEY=${{ secrets.VITE_JOTFORM_API_KEY }}"
            echo "VITE_JOTFORM_FORM_ID=${{ secrets.VITE_JOTFORM_FORM_ID }}"
            echo "VITE_JOTFORM_BASE_URL=${{ secrets.VITE_JOTFORM_BASE_URL }}"
            echo "VITE_GOOGLE_SHEET_WEBHOOK=${{ secrets.VITE_GOOGLE_SHEET_WEBHOOK }}"
            echo "VITE_SHARE_BASE=${{ secrets.VITE_SHARE_BASE }}"
          } > .env

      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - id: deployment
        uses: actions/deploy-pages@v4
